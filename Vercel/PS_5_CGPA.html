<!DOCTYPE html>
<html>
<head>
  <title>SPPU CGPA Calculator</title>

  <style>
    body{
      font-family: Arial;
      background:#f2f2f2;
      text-align:center;
      padding:40px;
    }

    .box{
      background:white;
      padding:25px;
      width:400px;
      margin:auto;
      border-radius:10px;
      box-shadow:0 0 10px gray;
    }

    input{
      width:90%;
      padding:10px;
      margin:10px;
      font-size:16px;
    }

    button{
      padding:10px 20px;
      background:blue;
      color:white;
      border:none;
      cursor:pointer;
      font-size:16px;
      border-radius:5px;
    }

    h2{
      color:green;
      margin-top:20px;
    }

    p{
      color:gray;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>SPPU CGPA Calculator</h1>

  <p>Enter SGPA of each semester</p>

  <input type="number" step="0.01" id="sem1" placeholder="Semester 1 SGPA">
  <input type="number" step="0.01" id="sem2" placeholder="Semester 2 SGPA">
  <input type="number" step="0.01" id="sem3" placeholder="Semester 3 SGPA">
  <input type="number" step="0.01" id="sem4" placeholder="Semester 4 SGPA">

  <button onclick="calculateCGPA()">Calculate CGPA</button>

  <h2 id="result"></h2>

</div>

<script>

function calculateCGPA(){

  // Taking SGPA input
  let sem1 = parseFloat(document.getElementById("sem1").value) || 0;
  let sem2 = parseFloat(document.getElementById("sem2").value) || 0;
  let sem3 = parseFloat(document.getElementById("sem3").value) || 0;
  let sem4 = parseFloat(document.getElementById("sem4").value) || 0;

  // Number of entered semesters
  let count = 0;
  let total = 0;

  if(sem1 > 0){
    total += sem1;
    count++;
  }

  if(sem2 > 0){
    total += sem2;
    count++;
  }

  if(sem3 > 0){
    total += sem3;
    count++;
  }

  if(sem4 > 0){
    total += sem4;
    count++;
  }

  // SPPU CGPA Formula
  // CGPA = Average of all Semester SGPAs

  let cgpa = 0;

  if(count > 0){
    cgpa = total / count;
  }

  document.getElementById("result").innerHTML =
    "Final CGPA = " + cgpa.toFixed(2);

}

</script>

</body>
</html>
